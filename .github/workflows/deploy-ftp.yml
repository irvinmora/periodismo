name: Deploy to InfinityFree via FTP

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: htdocs/ # La carpeta pública predeterminada en InfinityFree puede variar, pero generalmente es htdocs/ o public_html/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            README.md
            *.sql
            # Excluimos directorios locales innecesarios
            img/uploads/**
            admin/videos/uploads/**
            admin/audios/uploads/**
          dangerous-clean-slate: false # Para InfinityFree esto debe ser false, para que no borre todo tu servidor primero.
          security: loose # InfinityFree utiliza FTP estándar, no FTPS de forma predeterminada
